<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <style>
    .box { fill: #fff; stroke: #E6E9EF; stroke-width: 1; rx: 10; }
    .title { font: 700 14px Inter, sans-serif; fill: #0F172A }
    .sub { font: 12px Inter, sans-serif; fill: #475569 }
    .arrow { stroke: #9AA7B2; stroke-width: 1.6; fill: none; marker-end: url(#arrow) }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9AA7B2" />
    </marker>
  </defs>

  <!-- App -->
  <rect x="40" y="24" width="720" height="92" class="box"/>
  <text x="60" y="50" class="title">App (src/App.jsx)</text>
  <text x="60" y="72" class="sub">Coordinates layout: Sidebar, TickerTape, Header, Page content (AnimatePresence)</text>

  <!-- Layout row -->
  <rect x="72" y="150" width="220" height="84" class="box"/>
  <text x="92" y="178" class="title">Sidebar</text>
  <text x="92" y="198" class="sub">Navigation, opportunities badge, footer</text>

  <rect x="300" y="150" width="220" height="84" class="box"/>
  <text x="320" y="178" class="title">Header</text>
  <text x="320" y="198" class="sub">Page title, add-unit modal, search</text>

  <rect x="528" y="150" width="220" height="84" class="box"/>
  <text x="548" y="178" class="title">TickerTape</text>
  <text x="548" y="198" class="sub">Live rates scroll (reads units & rates)</text>

  <!-- Pages -->
  <rect x="72" y="270" width="240" height="116" class="box"/>
  <text x="92" y="298" class="title">Pages (src/pages/*)</text>
  <text x="92" y="320" class="sub">Dashboard, Matrix, Arbitrage, LoopVisualizer, Simulator, GraphExplorer, Units, Analytics, Settings</text>

  <rect x="344" y="270" width="404" height="116" class="box"/>
  <text x="364" y="298" class="title">UI Primitives (src/components/ui)</text>
  <text x="364" y="320" class="sub">Button, Card, Modal, Input, Badge, NotificationToast, tokens</text>

  <!-- arrows -->
  <path class="arrow" d="M 160 116 L 160 150" />
  <path class="arrow" d="M 420 116 L 420 150" />
  <path class="arrow" d="M 680 116 L 680 150" />

  <path class="arrow" d="M 190 234 L 190 270" />
  <path class="arrow" d="M 420 234 L 420 270" />
  <path class="arrow" d="M 630 234 L 630 270" />

  <!-- footer -->
  <text x="60" y="402" class="sub">Data & logic: src/store/useAppStore.js (Zustand store) • src/lib/algorithms.js (Bellman-Ford, simulation)</text>
</svg>